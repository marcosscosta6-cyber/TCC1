
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="cadastro.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Belanosima:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Cadastro Nexus</title>
</head>
<body>


  <div class="bg"></div>
    <div class="container">


      <div class="logo">
        <img src="../img/NexusS.png" alt="Logo Nexus">
      </div>


      <h1>Criar sua conta</h1>
      <p class="subtitle">Junte-se à comunidade Nexus</p>


      <form>


        <div class="input-group">
          <label for="nome">Nome completo</label>
          <input
          type="text"
          name="nome"
          required>
        </div>


        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email"
          name="email"
          required>
        </div>


        <div class="input-group">
          <label for="dataNasc">Data de nascimento</label>
          <input type="date"
          name="dataNasc"
          required>
        </div>


        <div class="input-group">
          <label>Escolaridade</label>
          <select>
            <option value="" disabled selected>Selecione</option>
            <option value="fundamentalCom">Ensino Fundamental completo</option>
            <option value="fundamentalAn">Ensino Fundamental em andamento</option>
            <option value="medioCom">Ensino Médio completo</option>
            <option value="medioAn">Ensino Médio em andamento</option>
            <option value="mediotec">Ensino Médio integrado ao Técnico completo</option>
            <option value="mediotecAn">Ensino Médio integrado ao Técnico em andamento</option>
            <option value="tecCom">Ensino Técnico completo</option>
            <option value="tecAn">Ensino Técnico em andamento</option>
            <option value="superiorCom">Ensino Superior completo</option>
            <option value="superiorAn">Ensino Superior em andamento</option>
          </select>
        </div>


        <div class="input-group">
          <label for="usuario">Usuário</label>
          <input type="text"
          name="usuario"
          required>
        </div>


        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password"
          name="senha"
          required>
        </div>


        <div class="input-group">
          <label for="confirm">Confirmar senha</label>
          <input type="password"
          name="confirm"
          required>
        </div>


        <div class="input-group">
          <label>Comprovante de matrícula SENAI</label>
          <p class="info">Caso for ex-aluno, certificado de conclusão de curso</p>


          <label class="upload-box">
            Clique para enviar arquivo
            <input type="file"
            hidden
            required>
          </label>
        </div>


        <button class="btn">Cadastrar</button>


      </form>


    </div>
  </div>    


</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="cadastro.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<title>Cadastro Nexus</title>

</head>

<body>

<div class="container">

  <div class="logo">
    <img src="../img/NexusS.png" alt="Logo Nexus">
  </div>

  <h1>Criar sua conta</h1>

  <p class="subtitle">
    Junte-se à comunidade Nexus
  </p>

  <form>

    <div class="input-group">
      <label>Nome completo</label>
      <input type="text" required>
    </div>

    <div class="input-group">
      <label>E-mail</label>
      <input type="email" required>
    </div>

    <div class="input-group">
      <label>Data de nascimento</label>
      <input type="date" required>
    </div>

    <div class="input-group">
      <label>Escolaridade</label>

      <select required>
        <option value="" disabled selected>
          Selecione
        </option>

        <option>Ensino Fundamental completo</option>
        <option>Ensino Fundamental em andamento</option>
        <option>Ensino Médio completo</option>
        <option>Ensino Médio em andamento</option>
        <option>Ensino Médio integrado ao Técnico completo</option>
        <option>Ensino Técnico completo</option>
        <option>Ensino Técnico em andamento</option>
        <option>Ensino Superior completo</option>
        <option>Ensino Superior em andamento</option>
      </select>
    </div>

    <div class="input-group">
      <label>Usuário</label>
      <input type="text" required>
    </div>

    <div class="input-group">
      <label>Senha</label>
      <input type="password" required>
    </div>

    <div class="input-group">
      <label>Confirmar senha</label>
      <input type="password" required>
    </div>

    <div class="input-group">

      <label>
        Comprovante de matrícula SENAI
      </label>

      <p class="info">
        Caso for ex-aluno, certificado de conclusão de curso
      </p>

      <label class="upload-box">
        Clique para enviar arquivo
        <input type="file" hidden required>
      </label>

    </div>

    <button class="btn">
      Cadastrar
    </button>

  </form>

</div>

</body>
</html>

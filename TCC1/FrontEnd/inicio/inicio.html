<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="inicio.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <title>Nexus page</title>
</head>

<body>

<header>

  <div class="Logo">
    <img src="../img/NexusS.png" alt="Logo Nexus">
    <h3 class="fw-bold text-white">Nexus</h3>
  </div>

  <div class="Header1">

    <ul>
      <li><a href="">Recursos</a></li>
      <li><a href="">Depoimentos</a></li>
      <li><a href="">Blog</a></li>
    </ul>

    <button class="btn btn-light" id="Entrar">
      Entrar
    </button>

    <button class="btn roxo" id="Cadastro" onclick="Cadastro()">
      Cadastrar
    </button>

  </div>

</header>



<!-- LOGIN -->
<div class="overlay" id="overlay">

  <form class="login-box">

    <img src="../img/NexusS.png" alt="Logo Nexus" width="100" height="100">

    <span class="text-black fechar" id="fechar">
      <h4>X</h4>
    </span>

    <h2 class="text-black">Bem-vindo de volta</h2>

    <p class="text-black">
      Faça login para acessar sua conta
    </p>

    <div class="loginIN">

      <label for="usuario" class="text-black">
        Usuário:
      </label>

      <input
        class="text-white"
        type="text"
        id="usuario"
        name="usuario"
        placeholder="Ex: Marcos07"
        required>

      <label for="senha" class="text-black">
        Senha:
      </label>

      <input
        class="text-white"
        type="password"
        id="senha"
        name="senha"
        placeholder="********"
        required>

      <a href="../redsenha/redsenha.html" class="esqueceu">
        Esqueceu sua senha?
      </a>

    </div>

    <button type="submit" class="btn w-100 text-white rounded-pill BotEn">
      Entrar
    </button>

    <p class="text-black">
      Não tem uma conta?

      <a href="../cadastro/Cadastro.html" class="text-purple">
        Cadastre-se
      </a>
    </p>

  </form>

</div>

<script src="../js/inicio.js"></script>

</body>
</html>

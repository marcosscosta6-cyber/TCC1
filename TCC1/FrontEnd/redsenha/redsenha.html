<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="../redsenha/redsenha.css">
  <title>Redefinir Senha</title> 
</head>
<body>

  <div class="bg"></div>

  <div class="container">

    <div class="logo">
      
      <img src="../img/NexusS.png" alt="Logo Nexus">

    </div>

    <h1>Redefinir Senha</h1>

    <p class="subtitulo">
      Digite sua nova senha para recuperar o acesso à sua conta.
    </p>

    <form>

      <div class="input-box">
        <label>Nova senha</label>
        <input type="password" placeholder="Digite sua nova senha">
      </div>

      <div class="input-box">
        <label>Confirmar senha</label>
        <input type="password" placeholder="Confirme sua senha">
      </div>

      <button class="btn">
        Redefinir senha
      </button>

    </form>

    <div class="voltar">
      Voltar para <a href="../inicio/inicio.html">Inicio</a>
    </div>

  </div>

</body>
</html>
